project:
  type: website
  output-dir: _site
  resources:
    - "animations/media/videos/**/*.mp4"

website:
  title: "Blog"
  description: "Ashish Srivastava's blog"
  site-url: https://ashishSrivastava-19.github.io/blog-posts/
  repo-url: https://github.com/ashishSrivastava-19/blog-posts
  navbar:
    left:
      - href: index.qmd
        text: Home
    right:
      - icon: github
        href: https://github.com/grim-hitman0XX/blog-posts
  page-footer:
    center: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme:
      light: [cosmo, custom.scss]
      dark: [darkly, custom.scss]
    include-in-header:
      - text: '<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">'
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    code-line-numbers: true
    highlight-style: github

execute:
  freeze: auto

bibliography: references.bib
html-math-method: katex
